<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Seed Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 3px; }
        button:hover { background: #0056b3; }
        .status { padding: 10px; margin: 10px 0; border-radius: 3px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .loading { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        textarea { width: 100%; height: 200px; padding: 10px; margin: 10px 0; }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>🌱 Database Seed Test Console</h1>
    
    <div class="section">
        <h2>Backend Status</h2>
        <button onclick="testHealth()">Check Backend Health</button>
        <div id="healthStatus"></div>
    </div>

    <div class="section">
        <h2>Database Seeding</h2>
        <label>
            Seed Key:
            <input type="text" id="seedKey" value="seed_secret_key_12345" style="width: 300px;">
        </label>
        <br><br>
        <label>
            Backend URL:
            <input type="text" id="backendUrl" value="https://erp-api-pr9p.onrender.com" style="width: 300px;">
        </label>
        <br><br>
        <button onclick="runSeed()">🌱 Run Database Seed</button>
        <button onclick="clearStatus()">Clear Output</button>
        <div id="seedStatus"></div>
    </div>

    <div class="section">
        <h2>Response Details</h2>
        <textarea id="responseOutput" readonly placeholder="Response will appear here..."></textarea>
    </div>

    <div class="section">
        <h2>Verify Seeded Data</h2>
        <button onclick="checkEmployees()">Check Employees</button>
        <button onclick="checkResources()">Check Resources</button>
        <button onclick="checkUsers()">Check Users</button>
        <div id="verifyStatus"></div>
    </div>

    <script>
        const log = (message, type = 'info') => {
            const statusDiv = document.getElementById('seedStatus');
            const newStatus = document.createElement('div');
            newStatus.className = `status ${type}`;
            newStatus.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            statusDiv.appendChild(newStatus);
            
            if (type === 'success' || type === 'error') {
                statusDiv.scrollTop = statusDiv.scrollHeight;
            }
        };

        const appendOutput = (text) => {
            const output = document.getElementById('responseOutput');
            output.value += text + '\n';
            output.scrollTop = output.scrollHeight;
        };

        const testHealth = async () => {
            log('Testing backend health...', 'loading');
            try {
                const response = await fetch(document.getElementById('backendUrl').value + '/api/health');
                const data = await response.json();
                appendOutput(`Health Check Response: ${JSON.stringify(data, null, 2)}`);
                log('✅ Backend is responding!', 'success');
            } catch (error) {
                appendOutput(`Health Check Error: ${error.message}`);
                log(`❌ Error: ${error.message}`, 'error');
            }
        };

        const runSeed = async () => {
            log('Starting database seed...', 'loading');
            appendOutput('\n=== SEED ENDPOINT CALL ===\n');
            
            const backendUrl = document.getElementById('backendUrl').value;
            const seedKey = document.getElementById('seedKey').value;
            const url = backendUrl + '/api/admin/seed';
            
            appendOutput(`POST ${url}`);
            appendOutput(`Headers: x-seed-key: ${seedKey}`);
            appendOutput(`Body: {}\n`);

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'x-seed-key': seedKey,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({}),
                });

                appendOutput(`\nStatus: ${response.status} ${response.statusText}`);
                const data = await response.json();
                appendOutput(`\nResponse Body:\n${JSON.stringify(data, null, 2)}`);

                if (response.ok) {
                    log('✅ Seed successful!', 'success');
                } else {
                    log(`❌ Seed failed: ${data.error || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                appendOutput(`\nError: ${error.message}`);
                log(`❌ Error: ${error.message}`, 'error');
            }
        };

        const checkEmployees = async () => {
            log('Fetching employees...', 'loading');
            try {
                const response = await fetch(document.getElementById('backendUrl').value + '/api/employees');
                const data = await response.json();
                appendOutput(`\n=== EMPLOYEES CHECK ===\nCount: ${data.length || 0}\n${JSON.stringify(data, null, 2)}`);
                log(`Found ${data.length || 0} employees`, data.length > 0 ? 'success' : 'info');
            } catch (error) {
                appendOutput(`\nEmployee Check Error: ${error.message}`);
                log(`Error: ${error.message}`, 'error');
            }
        };

        const checkResources = async () => {
            log('Fetching resources...', 'loading');
            try {
                const response = await fetch(document.getElementById('backendUrl').value + '/api/resources');
                const data = await response.json();
                appendOutput(`\n=== RESOURCES CHECK ===\nCount: ${data.length || 0}\n${JSON.stringify(data, null, 2)}`);
                log(`Found ${data.length || 0} resources`, data.length > 0 ? 'success' : 'info');
            } catch (error) {
                appendOutput(`\nResource Check Error: ${error.message}`);
                log(`Error: ${error.message}`, 'error');
            }
        };

        const checkUsers = async () => {
            log('Fetching users...', 'loading');
            try {
                const response = await fetch(document.getElementById('backendUrl').value + '/api/users');
                const data = await response.json();
                appendOutput(`\n=== USERS CHECK ===\nCount: ${data.length || 0}\n${JSON.stringify(data, null, 2)}`);
                log(`Found ${data.length || 0} users`, data.length > 0 ? 'success' : 'info');
            } catch (error) {
                appendOutput(`\nUser Check Error: ${error.message}`);
                log(`Error: ${error.message}`, 'error');
            }
        };

        const clearStatus = () => {
            document.getElementById('responseOutput').value = '';
            document.getElementById('seedStatus').innerHTML = '';
            log('Output cleared', 'info');
        };

        // Initial check
        log('Test console ready. Click "Check Backend Health" to start.', 'info');
    </script>
</body>
</html>
